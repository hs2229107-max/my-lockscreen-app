name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Compatible Gradle 8.5
      run: |
        wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q gradle-8.5-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-8.5/bin" >> $GITHUB_PATH

    - name: Setup Android Project Files
      run: |
        # 1. إنشاء الهيكلية الصحيحة
        mkdir -p app/src/main/java/com/hawahi/locker
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml

        # 2. نقل ملفات الـ Java وإصلاح ainActivity.java -> MainActivity.java
        find x/ -name "*.java" -exec cp {} app/src/main/java/com/hawahi/locker/ \;
        if [ -f app/src/main/java/com/hawahi/locker/ainActivity.java ]; then
            mv app/src/main/java/com/hawahi/locker/ainActivity.java app/src/main/java/com/hawahi/locker/MainActivity.java
        fi

        # 3. نقل ملفات الـ Layout وإصلاح ctivity_main.xml -> activity_main.xml
        find x/ -name "*ctivity_main.xml" -exec cp {} app/src/main/res/layout/activity_main.xml \; 2>/dev/null || true
        find x/ -name "lock_screen.xml" -exec cp {} app/src/main/res/layout/ \; 2>/dev/null || true

        # 4. نقل ملفات الـ Values
        find x/ -name "strings.xml" -exec cp {} app/src/main/res/values/ \; 2>/dev/null || true
        find x/ -name "colors.xml" -exec cp {} app/src/main/res/values/ \; 2>/dev/null || true
        find x/ -name "themes.xml" -exec cp {} app/src/main/res/values/ \; 2>/dev/null || true

        # 5. نقل ملف الـ XML (Device Admin)
        find x/ -name "device_admin.xml" -exec cp {} app/src/main/res/xml/ \; 2>/dev/null || true

        # 6. إعداد ملفات Gradle و AndroidX
        echo 'android.useAndroidX=true' > gradle.properties
        echo 'android.enableJetifier=true' >> gradle.properties

        echo 'rootProject.name = "MyLockScreenApp"' > settings.gradle
        echo "include ':app'" >> settings.gradle

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.hawahi.locker'
            compileSdk 34
            defaultConfig {
                applicationId "com.hawahi.locker"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }
        EOF

        # 7. إنشاء AndroidManifest متوافق
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <application
                android:allowBackup="true"
                android:label="Locker App"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name=".LockScreenActivity" android:exported="false" />
                <service android:name=".LockScreenService" android:enabled="true" android:exported="false" />
                <receiver android:name=".BootReceiver" android:enabled="true" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.BOOT_COMPLETED" />
                    </intent-filter>
                </receiver>
                <receiver android:name=".AdminReceiver" android:permission="android.permission.BIND_DEVICE_ADMIN" android:exported="true">
                    <meta-data android:name="android.app.device_admin" android:resource="@xml/device_admin" />
                    <intent-filter>
                        <action android:name="android.app.action.DEVICE_ADMIN_ENABLED" />
                    </intent-filter>
                </receiver>
            </application>
        </manifest>
        EOF

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
